# =============================================
#   E-Commerce Test Automation - Config File
# =============================================

# Base URL (using SauceDemo - a free test site)
base.url=https://www.saucedemo.com

# Browser: chrome | firefox | edge
browser=chrome

# Implicit wait timeout (seconds)
implicit.wait=10

# Explicit wait timeout (seconds)
explicit.wait=15

# Page load timeout (seconds)
page.load.timeout=30

# Run in headless mode: true | false
headless=false

# Screenshots directory
screenshot.dir=test-output/screenshots

# Reports directory
report.dir=reports

# Test Credentials
valid.username=standard_user
valid.password=secret_sauce

# Locked out user (for negative test)
locked.username=locked_out_user
locked.password=secret_sauce

# Product to search/add
product.name=Sauce Labs Backpack

# Checkout info
checkout.firstname=John
checkout.lastname=Doe
checkout.zipcode=10001
